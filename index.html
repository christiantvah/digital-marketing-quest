<!DOCTYPE html>
<html lang="es-PE" data-mode="day">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="description" content="Digital Marketing Quest — Aprende marketing digital jugando. Curso UCV Ciclo V." />
  <meta name="theme-color" content="#2563EB" />
  <meta name="color-scheme" content="light dark" />
  <title>Digital Marketing Quest</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E🎮%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/reset.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/screens.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body>
  <a href="#app" class="skip-link">Saltar al contenido principal</a>

  <header class="topbar" id="topbar" hidden>
    <button class="topbar__brand" id="brandBtn" aria-label="Ir al inicio">
      <span class="topbar__logo" aria-hidden="true">🎮</span>
      <span class="topbar__title">Digital Marketing Quest</span>
    </button>
    <div class="topbar__hud" id="topbarHud" aria-live="polite"></div>
    <div class="topbar__actions">
      <button class="icon-btn" id="modeToggle" aria-label="Cambiar modo día/noche" title="Cambiar día/noche">
        <span class="mode-icon mode-icon--day" aria-hidden="true">☀️</span>
        <span class="mode-icon mode-icon--night" aria-hidden="true">🌙</span>
      </button>
      <button class="icon-btn" id="soundToggle" aria-label="Activar/desactivar sonido" title="Sonido">
        <span class="sound-icon sound-icon--on" aria-hidden="true">🔊</span>
        <span class="sound-icon sound-icon--off" aria-hidden="true">🔇</span>
      </button>
      <button class="icon-btn" id="menuBtn" aria-label="Abrir menú" title="Menú">☰</button>
    </div>
  </header>

  <main id="app" class="app" aria-live="polite"></main>

  <div class="modal-root" id="modalRoot" aria-live="assertive"></div>
  <div class="toast-root" id="toastRoot" aria-live="polite" aria-atomic="true"></div>
  <canvas id="confettiCanvas" class="confetti-canvas" aria-hidden="true"></canvas>

  <noscript>
    <div class="noscript">
      <h1>Necesitas JavaScript activado</h1>
      <p>Este juego usa JavaScript para funcionar. Por favor activa JavaScript en tu navegador.</p>
    </div>
  </noscript>

  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
